<!-- src/app/features/login/login.component.html -->
<div class="login-wrapper" style="max-width:360px;margin:48px auto;font-family:system-ui,Segoe UI,Roboto,Arial;">
  <h2 style="margin:0 0 16px;">Acessar</h2>

  <form (ngSubmit)="onSubmit()">
    <label style="display:block;margin:8px 0 4px;">Usuário</label>
    <input [(ngModel)]="username" name="username" required style="width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;">

    <label style="display:block;margin:12px 0 4px;">Senha</label>
    <input [(ngModel)]="password" name="password" type="password" required style="width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;">

    <button type="submit" [disabled]="loading" style="margin-top:16px;width:100%;padding:10px;border:none;border-radius:6px;background:#1976d2;color:#fff;">
      {{ loading ? 'Entrando...' : 'Entrar' }}
    </button>

    <div *ngIf="errorMsg" style="margin-top:12px;color:#c62828;">{{ errorMsg }}</div>
  </form>
</div>
